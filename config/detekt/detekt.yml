# Detekt Configuration for Java Starter Kit
# See: https://detekt.dev/docs/introduction/configurations

build:
  maxIssues: 10
  excludeCorrectable: false

complexity:
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 8
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 15
    thresholdInInterfaces: 10
    thresholdInObjects: 10
    thresholdInEnums: 5
  NestedBlockDepth:
    active: true
    threshold: 4

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: true
  MaxLineLength:
    active: true
    maxLineLength: 120
  ReturnCount:
    active: true
    max: 3
  NewLineAtEndOfFile:
    active: true
  TrailingWhitespace:
    active: true
  UnusedImports:
    active: true
  UnusedPrivateMember:
    active: true

naming:
  FunctionNaming:
    active: true
    functionPattern: "[a-zA-Z][a-zA-Z0-9]*"
  VariableNaming:
    active: true
    variablePattern: "[a-z][a-zA-Z0-9]*"
  ClassNaming:
    active: true
    classPattern: "[A-Z][a-zA-Z0-9]*"
  PackageNaming:
    active: true
    packagePattern: "[a-z]+(\\.[a-z][a-z0-9]*)*"

exceptions:
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - "Exception"
      - "RuntimeException"
      - "Throwable"
  TooGenericExceptionThrown:
    active: true
    exceptionNames:
      - "Exception"
      - "RuntimeException"
      - "Throwable"
  SwallowedException:
    active: true

performance:
  SpreadOperator:
    active: false
  ForEachOnRange:
    active: true

potential-bugs:
  EqualsAlwaysReturnsTrueOrFalse:
    active: true
  UnreachableCode:
    active: true
  IteratorNotThrowingNoSuchElementException:
    active: true
