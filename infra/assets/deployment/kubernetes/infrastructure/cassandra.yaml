apiVersion: v1
kind: Service
metadata:
  name: cassandra
  namespace: default
  labels:
    app: cassandra
spec:
  ports:
    - port: 9042
      name: cql
  clusterIP: None
  selector:
    app: cassandra
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  namespace: default
spec:
  serviceName: "cassandra"
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
    spec:
      containers:
        - name: cassandra
          image: cassandra:5.0.6
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          ports:
            - containerPort: 9042
              name: cql
          env:
            - name: CASSANDRA_USER
              value: user
            - name: CASSANDRA_PASSWORD
              value: pass
          readinessProbe:
            exec:
              command: [ "cqlsh", "-e", "describe keyspaces" ]
            initialDelaySeconds: 45
            periodSeconds: 10
          volumeMounts:
            - name: cassandra-storage
              mountPath: /var/lib/cassandra
  volumeClaimTemplates:
    - metadata:
        name: cassandra-storage
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi
