apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: default
  labels:
    app: vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.13.3
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          ports:
            - containerPort: 8200
              name: http
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              value: myroot
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: 0.0.0.0:8200
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: default
spec:
  ports:
    - port: 8200
      targetPort: 8200
      name: http
  selector:
    app: vault
  type: ClusterIP
