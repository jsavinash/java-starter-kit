services:
  vault:
    image: hashicorp/vault:1.13.3
    container_name: vault
    ports:
      - "8200:8200"
    environment:
      # Sets a root token for testing (change for security)
      - VAULT_DEV_ROOT_TOKEN_ID=myroot
      # Listens on all interfaces within the container
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    # IPC_LOCK prevents Vault from swapping sensitive data to disk
    cap_add:
      - IPC_LOCK
