services:
  redis:
    image: redis:8.4.0
    ports:
      - "6379:6379"
    volumes:
      # Mount a local directory to the container's data directory for persistence
      - redis_data:/data
    command: [ "redis-server", "--appendonly", "yes" ] # Enable AOF persistence
    networks:
      - redis_network


networks:
  redis_network:
    driver: bridge

volumes:
  redis_data:
    driver: local
