name: Java Starter Kit CI

on:
  push:
    branches: [ develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, master, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ===========================================================================
  # Quality Checks - Code Style, Static Analysis
  # ===========================================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Code Formatting Check (Spotless)
        run: ./gradlew spotlessCheck --no-daemon --build-cache --parallel

      - name: Static Analysis - Checkstyle (Java)
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon --build-cache --parallel

      - name: Static Analysis - Detekt (Kotlin)
        run: ./gradlew detektMain detektTest --no-daemon --build-cache --parallel

      - name: Static Analysis - PMD (Java)
        run: ./gradlew pmdMain pmdTest --no-daemon --build-cache --parallel

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            **/build/reports/checkstyle/
            **/build/reports/detekt/
            **/build/reports/pmd/
          retention-days: 7

  # ===========================================================================
  # Tests - Unit tests and Integration tests
  # ===========================================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: gradle

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon --build-cache --parallel

      - name: Run Coverage Verification
        run: ./gradlew jacocoTestCoverageVerification --no-daemon --build-cache --parallel || true

      - name: Generate Coverage Reports
        run: ./gradlew jacocoTestReport --no-daemon --build-cache --parallel || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/reports/jacoco/
          retention-days: 14

      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/test-results/**/TEST-*.xml
          retention-days: 7

  # ===========================================================================
  # Dependency Check - Vulnerability scanning
  # ===========================================================================
  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: gradle

      - name: Analyze dependencies
        continue-on-error: true
        run: ./gradlew dependencyCheckAnalyze --no-daemon --build-cache || echo "Dependency check completed with warnings"

      - name: Upload dependency check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: '**/build/reports/dependency-check/'
          retention-days: 7

  # ===========================================================================
  # Build - Full project compilation
  # ===========================================================================
  build:
    name: Full Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: gradle

      - name: Full Build
        run: ./gradlew build --no-daemon --build-cache --parallel --continue

      - name: Store build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            **/build/libs/
            **/build/distributions/
          retention-days: 3

  # ===========================================================================
  # Quality Gate - Aggregated status check
  # ===========================================================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [build, dependency-check]
    if: always()

    steps:
      - name: Check Quality Gate status
        run: |
          echo "🔍 Checking Quality Gate Results"
          echo "Build: ${{ needs.build.result }}"
          echo "Dependency Check: ${{ needs.dependency-check.result }}"
          
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ Quality Gate: PASSED"
            exit 0
          else
            echo "❌ Quality Gate: FAILED"
            exit 1
          fi